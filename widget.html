<div id="widget" class="widget hidden">

  <!-- Fond flouté (image de couverture) -->
  <div id="bg" class="widget__bg"></div>
  <!-- Overlay sombre -->
  <div class="widget__overlay"></div>

  <!-- Contenu principal -->
  <div class="widget__content">

    <!-- Emote personnalisable -->
    <img id="emote" class="widget__emote" src="" alt="" />

    <!-- Barres audio animées -->
    <div id="audiobars" class="widget__bars">
      <span class="bar bar1"></span>
      <span class="bar bar2"></span>
      <span class="bar bar3"></span>
      <span class="bar bar4"></span>
    </div>

    <!-- Pochette album -->
    <div class="widget__cover-wrap">
      <img id="cover" class="widget__cover" src="" alt="cover" />
    </div>

    <!-- Infos piste -->
    <div class="widget__info">
      <div class="scroll-wrap">
        <span id="title" class="widget__title scroll-text"></span>
      </div>
      <div class="scroll-wrap">
        <span id="artist" class="widget__artist scroll-text"></span>
      </div>
      <div class="scroll-wrap">
        <span id="album" class="widget__album scroll-text"></span>
      </div>

      <!-- Barre de progression + timer -->
      <div class="widget__progress-row">
        <div class="widget__progress-track">
          <div id="progress-bar" class="widget__progress-fill"></div>
        </div>
        <span id="timer" class="widget__timer">0:00</span>
      </div>
    </div>

  </div>
</div>
